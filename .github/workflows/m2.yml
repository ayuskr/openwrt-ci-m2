name: ZN-M2 Ultimate Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch: {}

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2-Ultimate
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Init
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo apt -y install dos2unix libfuse-dev python3 python3-pip python3-setuptools python3-venv

    - name: Clone
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: DIY
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: Kill WiFi (关键)
      run: |
        cd openwrt

        sed -i '/wpad/d;/hostapd/d;/supplicant/d;/ath11k/d;/mac80211/d;/cfg80211/d;/wifi/d;/iw/d;/wireless/d' .config
        sed -i '/CONFIG_DEFAULT_.*wpad/d;/CONFIG_DEFAULT_.*hostapd/d;/CONFIG_DEFAULT_.*wifi/d' .config

        cat >> .config <<EOF
# CONFIG_PACKAGE_wpad is not set
# CONFIG_PACKAGE_wpad-full-openssl is not set
# CONFIG_PACKAGE_hostapd is not set
# CONFIG_PACKAGE_hostapd-common is not set
# CONFIG_PACKAGE_supplicant-full-internal is not set
# CONFIG_PACKAGE_kmod-ath11k is not set
# CONFIG_PACKAGE_kmod-mac80211 is not set
# CONFIG_PACKAGE_mac80211 is not set
# CONFIG_PACKAGE_cfg80211 is not set
# CONFIG_PACKAGE_wifi-scripts is not set
# CONFIG_PACKAGE_iw is not set
# CONFIG_PACKAGE_iw-tiny is not set
# CONFIG_PACKAGE_luci-app-wireless is not set
EOF

        make defconfig

    - name: Download
      run: |
        cd openwrt
        make download -j8

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-${{ github.run_number }}
        name: ZN-M2 Firmware
        artifacts: openwrt/bin/targets/**/*.*
        token: ${{ secrets.GITHUB_TOKEN }}
