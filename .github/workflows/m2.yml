name: ZN-M2 Ultimate Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch: {}

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2-Ultimate
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo apt -y install dos2unix libfuse-dev python3 python3-pip python3-setuptools python3-venv

    - name: Clone
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: DIY
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: Kill WiFi（最终稳定版）
      run: |
        cd openwrt

        make defconfig

        # 删除 WiFi 相关
        sed -i '/wpad/d;/hostapd/d;/supplicant/d;/ath11k/d;/mac80211/d;/cfg80211/d;/wifi/d;/wireless/d' .config

        # 删除默认依赖
        sed -i '/CONFIG_DEFAULT_.*wpad/d;/CONFIG_DEFAULT_.*hostapd/d;/CONFIG_DEFAULT_.*wifi/d' .config

        # 强制禁用
        echo "# CONFIG_PACKAGE_wpad is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-full-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_hostapd is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant-full-internal is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-mac80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_wifi-scripts is not set" >> .config

        echo "# CONFIG_DEFAULT_wpad is not set" >> .config
        echo "# CONFIG_DEFAULT_wpad-openssl is not set" >> .config
        echo "# CONFIG_DEFAULT_hostapd is not set" >> .config
        echo "# CONFIG_DEFAULT_wifi-scripts is not set" >> .config

        make defconfig

        echo "==== 检查关键WiFi组件 ===="
        grep -E "CONFIG_PACKAGE_(wpad|hostapd|supplicant|mac80211|wifi-scripts)" .config || true

        # 只检测真正会炸的包
        if grep -qE "CONFIG_PACKAGE_(wpad|hostapd|supplicant|kmod-mac80211|wifi-scripts)=y" .config; then
          echo "ERROR: WiFi core packages still enabled"
          exit 1
        fi

    - name: Download
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-${{ github.run_number }}
        name: ZN-M2 Firmware
        artifacts: openwrt/bin/targets/**/*.*
        token: ${{ secrets.GITHUB_TOKEN }}
