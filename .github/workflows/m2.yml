name: ZN-M2 Ultimate Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch: {}

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2-Ultimate
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq update
        sudo -E apt -yqq install dos2unix libfuse-dev python3 python3-pip python3-setuptools python3-venv
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Add Custom Feeds
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config
        [ -d files ] && cp -r files openwrt/files
        cd openwrt
        make defconfig

    - name: Force Disable WiFi USB
      run: |
        cd openwrt

        make defconfig

        sed -i '/CONFIG_PACKAGE_.*wpad/d' .config
        sed -i '/CONFIG_PACKAGE_.*hostapd/d' .config
        sed -i '/CONFIG_PACKAGE_.*ath11k/d' .config
        sed -i '/CONFIG_PACKAGE_.*mac80211/d' .config
        sed -i '/CONFIG_PACKAGE_.*cfg80211/d' .config
        sed -i '/CONFIG_PACKAGE_.*wireless/d' .config
        sed -i '/CONFIG_PACKAGE_.*kmod-usb/d' .config

        sed -i '/CONFIG_DEFAULT_.*wpad/d' .config
        sed -i '/CONFIG_DEFAULT_.*hostapd/d' .config
        sed -i '/CONFIG_DEFAULT_.*ath11k/d' .config
        sed -i '/CONFIG_DEFAULT_.*mac80211/d' .config
        sed -i '/CONFIG_DEFAULT_.*cfg80211/d' .config
        sed -i '/CONFIG_DEFAULT_.*wireless/d' .config
        sed -i '/CONFIG_DEFAULT_.*kmod-usb/d' .config

        {
          echo "# CONFIG_PACKAGE_wpad is not set"
          echo "# CONFIG_PACKAGE_wpad-basic is not set"
          echo "# CONFIG_PACKAGE_wpad-basic-mbedtls is not set"
          echo "# CONFIG_PACKAGE_wpad-basic-openssl is not set"
          echo "# CONFIG_PACKAGE_wpad-openssl is not set"
          echo "# CONFIG_PACKAGE_wpad-wolfssl is not set"
          echo "# CONFIG_PACKAGE_wpad-full is not set"
          echo "# CONFIG_PACKAGE_wpad-full-openssl is not set"
          echo "# CONFIG_PACKAGE_hostapd is not set"
          echo "# CONFIG_PACKAGE_hostapd-common is not set"
          echo "# CONFIG_PACKAGE_kmod-ath11k is not set"
          echo "# CONFIG_PACKAGE_kmod-ath11k-ahb is not set"
          echo "# CONFIG_PACKAGE_kmod-ath11k-pci is not set"
          echo "# CONFIG_PACKAGE_mac80211 is not set"
          echo "# CONFIG_PACKAGE_cfg80211 is not set"
          echo "# CONFIG_PACKAGE_wireless-regdb is not set"
          echo "# CONFIG_PACKAGE_luci-app-wireless is not set"

          echo "# CONFIG_DEFAULT_wpad is not set"
          echo "# CONFIG_DEFAULT_wpad-basic is not set"
          echo "# CONFIG_DEFAULT_wpad-basic-mbedtls is not set"
          echo "# CONFIG_DEFAULT_wpad-basic-openssl is not set"
          echo "# CONFIG_DEFAULT_wpad-openssl is not set"
          echo "# CONFIG_DEFAULT_wpad-wolfssl is not set"
          echo "# CONFIG_DEFAULT_wpad-full is not set"
          echo "# CONFIG_DEFAULT_wpad-full-openssl is not set"
          echo "# CONFIG_DEFAULT_hostapd is not set"
          echo "# CONFIG_DEFAULT_hostapd-common is not set"
          echo "# CONFIG_DEFAULT_kmod-ath11k is not set"
          echo "# CONFIG_DEFAULT_kmod-ath11k-ahb is not set"
          echo "# CONFIG_DEFAULT_kmod-ath11k-pci is not set"
          echo "# CONFIG_DEFAULT_mac80211 is not set"
          echo "# CONFIG_DEFAULT_cfg80211 is not set"
          echo "# CONFIG_DEFAULT_wireless-regdb is not set"
          echo "# CONFIG_DEFAULT_luci-app-wireless is not set"

          echo "# CONFIG_PACKAGE_kmod-usb-core is not set"
          echo "# CONFIG_PACKAGE_kmod-usb2 is not set"
          echo "# CONFIG_PACKAGE_kmod-usb3 is not set"
        } >> .config

        echo "==== 检查 WiFi 残留 ===="
        grep -E "CONFIG_(PACKAGE|DEFAULT)_(wpad|hostapd|ath11k|mac80211|cfg80211|wireless)" .config || true

        if grep -q "CONFIG_PACKAGE_wpad-full-openssl=y" .config; then
          echo "ERROR: wpad-full-openssl still enabled"
          exit 1
        fi

    - name: Download
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Organize Firmware
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-Ultimate-${{ github.run_number }}
        name: ZN-M2 Ultimate Firmware
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
