name: ZN-M2 Ultimate Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch: {}

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2-Ultimate
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq update
        sudo -E apt -yqq install dos2unix libfuse-dev python3 python3-pip python3-setuptools python3-venv
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Patch Device Default Packages
      run: |
        cd openwrt

        echo "==== Patch 设备默认 WiFi 包，防止 defconfig 自动拉回 ===="

        find target/linux/qualcommax -type f \( -name "*.mk" -o -name "Makefile" -o -name "*.dts" -o -name "*.dtsi" \) -print0 | \
        xargs -0 sed -i \
          -e 's/[[:space:]]wpad-openssl//g' \
          -e 's/[[:space:]]wpad-basic//g' \
          -e 's/[[:space:]]wpad-basic-mbedtls//g' \
          -e 's/[[:space:]]wpad-basic-openssl//g' \
          -e 's/[[:space:]]wpad-full//g' \
          -e 's/[[:space:]]wpad-full-openssl//g' \
          -e 's/[[:space:]]hostapd//g' \
          -e 's/[[:space:]]hostapd-common//g' \
          -e 's/[[:space:]]hostapd-openssl//g' \
          -e 's/[[:space:]]supplicant//g' \
          -e 's/[[:space:]]supplicant-full//g' \
          -e 's/[[:space:]]supplicant-full-internal//g' \
          -e 's/[[:space:]]wifi-scripts//g' \
          -e 's/[[:space:]]kmod-mac80211//g' \
          -e 's/[[:space:]]mac80211//g' \
          -e 's/[[:space:]]kmod-cfg80211//g' \
          -e 's/[[:space:]]cfg80211//g' \
          -e 's/[[:space:]]kmod-ath11k//g' \
          -e 's/[[:space:]]kmod-ath11k-ahb//g' \
          -e 's/[[:space:]]kmod-ath11k-pci//g' \
          -e 's/[[:space:]]ath11k-firmware-ipq6018//g' \
          -e 's/[[:space:]]wireless-regdb//g'

        echo "==== Patch 后检查默认 WiFi 残留 ===="
        grep -R "wpad-openssl\|wifi-scripts\|kmod-mac80211\|ath11k-firmware-ipq6018" target/linux/qualcommax || true

    - name: Add Custom Feeds
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config
        [ -d files ] && cp -r files openwrt/files
        cd openwrt
        make defconfig

    - name: Force Disable WiFi USB
      run: |
        cd openwrt

        sed -i '/wpad/d;/hostapd/d;/supplicant/d;/ath11k/d;/mac80211/d;/cfg80211/d;/wifi/d;/wireless/d' .config
        sed -i '/CONFIG_DEFAULT_.*wpad/d;/CONFIG_DEFAULT_.*hostapd/d;/CONFIG_DEFAULT_.*wifi/d;/CONFIG_DEFAULT_.*mac80211/d;/CONFIG_DEFAULT_.*ath11k/d' .config

        echo "# CONFIG_PACKAGE_wpad is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-basic is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-basic-mbedtls is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-basic-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-full is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-full-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_hostapd is not set" >> .config
        echo "# CONFIG_PACKAGE_hostapd-common is not set" >> .config
        echo "# CONFIG_PACKAGE_hostapd-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant-full is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant-full-internal is not set" >> .config
        echo "# CONFIG_PACKAGE_wifi-scripts is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-mac80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_mac80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-cfg80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_cfg80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-ath11k is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-ath11k-ahb is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-ath11k-pci is not set" >> .config
        echo "# CONFIG_PACKAGE_wireless-regdb is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-wireless is not set" >> .config

        echo "# CONFIG_PACKAGE_kmod-usb-core is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-usb2 is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-usb3 is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-usb-storage is not set" >> .config

        make defconfig

        echo "==== 检查真正启用的 WiFi 核心组件 ===="
        grep -E "^CONFIG_PACKAGE_(wpad|wpad-openssl|wpad-full-openssl|hostapd|supplicant|wifi-scripts|kmod-mac80211|mac80211|kmod-cfg80211|kmod-ath11k)=y" .config || true

        if grep -qE "^CONFIG_PACKAGE_(wpad|wpad-openssl|wpad-full-openssl|hostapd|supplicant|wifi-scripts|kmod-mac80211|mac80211|kmod-cfg80211|kmod-ath11k)=y" .config; then
          echo "ERROR: WiFi core packages still enabled"
          exit 1
        fi

    - name: Verify Plugins
      run: |
        cd openwrt
        echo "==== 检查目标平台 ===="
        grep -E "^CONFIG_TARGET_qualcommax|^CONFIG_TARGET_qualcommax_ipq60xx|DEVICE_(cmiot_ax18|zn_m2)=y" .config || true

        echo "==== 检查插件是否启用 ===="
        grep -E "^CONFIG_PACKAGE_luci-app-(passwall|mosdns|lucky|gecoosac)=y" .config || true
        grep -E "^CONFIG_PACKAGE_(xray-core|mosdns|lucky)=y" .config || true

        echo "==== 检查中文语言包 ===="
        grep -E "^CONFIG_PACKAGE_luci-i18n-(base|firewall|opkg)-zh-cn=y" .config || true
        grep -E "^CONFIG_PACKAGE_luci-theme-aurora=y" .config || true

    - name: Download
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Organize Firmware
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-Ultimate-${{ github.run_number }}
        name: ZN-M2 Ultimate Firmware
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
