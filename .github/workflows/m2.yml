name: ZN-M2 Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq update
        sudo -E apt -yqq install dos2unix libfuse-dev python3 python3-pip python3-setuptools python3-venv
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E systemctl daemon-reexec
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: DIY
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Download
      run: |
        cd openwrt

        make defconfig

        # 强制关闭 WiFi / hostapd / wpad，修复 he_mu_edca 编译错误
        ./scripts/config -d PACKAGE_wpad
        ./scripts/config -d PACKAGE_wpad-basic
        ./scripts/config -d PACKAGE_wpad-basic-mbedtls
        ./scripts/config -d PACKAGE_wpad-basic-openssl
        ./scripts/config -d PACKAGE_wpad-openssl
        ./scripts/config -d PACKAGE_wpad-wolfssl
        ./scripts/config -d PACKAGE_wpad-full
        ./scripts/config -d PACKAGE_wpad-full-openssl
        ./scripts/config -d PACKAGE_hostapd
        ./scripts/config -d PACKAGE_hostapd-common
        ./scripts/config -d PACKAGE_kmod-ath11k
        ./scripts/config -d PACKAGE_kmod-ath11k-ahb
        ./scripts/config -d PACKAGE_kmod-ath11k-pci
        ./scripts/config -d PACKAGE_mac80211
        ./scripts/config -d PACKAGE_cfg80211
        ./scripts/config -d PACKAGE_iw
        ./scripts/config -d PACKAGE_iwinfo
        ./scripts/config -d PACKAGE_wireless-regdb
        ./scripts/config -d PACKAGE_luci-app-wireless

        make defconfig

        echo "==== 检查 WiFi 残留 ===="
        grep -E "CONFIG_PACKAGE_(wpad|hostapd|ath11k|mac80211|cfg80211|iw|wireless)" .config || true

        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-${{ github.run_number }}
        name: ZN-M2 Firmware
        artifacts: openwrt/bin/targets/**/*.bin,openwrt/bin/targets/**/*.img.gz,openwrt/bin/targets/**/*.manifest,openwrt/bin/targets/**/*.buildinfo
        token: ${{ secrets.GITHUB_TOKEN }}
