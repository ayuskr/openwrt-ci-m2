name: ZN-M2 Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Initialization Environment(初始化环境)
   env:
    DEBIAN_FRONTEND: noninteractive
  run: |
    echo "🔧 初始化编译环境..."

    # 官方初始化脚本（核心）
    sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

    # 补充必要依赖（避免缺包）
    sudo -E apt -yqq update
    sudo -E apt -yqq install \
      dos2unix \
      libfuse-dev \
      python3 \
      python3-pip \
      python3-setuptools \
      python3-venv

    # 清理系统（释放空间）
    sudo -E apt -yqq autoremove --purge
    sudo -E apt -yqq autoclean
    sudo -E apt -yqq clean

    # 刷新服务
    sudo -E systemctl daemon-reexec
    sudo -E systemctl daemon-reload

    # 设置时区
    sudo timedatectl set-timezone "$TZ"

    echo "✅ 环境初始化完成"
    - name: Clone Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: DIY
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Download
      run: |
        cd openwrt
        make defconfig
        make download -j8

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1

    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-${{ github.run_number }}
        name: ZN-M2 Firmware
        artifacts: openwrt/bin/targets/**/*.*
        token: ${{ secrets.GITHUB_TOKEN }}
