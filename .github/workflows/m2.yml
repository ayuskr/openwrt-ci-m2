name: ZN-M2 Ultimate Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch: {}

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/m2.config
  DIY_SCRIPT: diy.sh
  FIRMWARE_TAG: ZN-M2-Ultimate
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo apt -y install dos2unix libfuse-dev python3 python3-pip python3-setuptools python3-venv

    - name: Clone
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Add Custom Feeds
      run: |
        chmod +x $DIY_SCRIPT
        bash $DIY_SCRIPT

    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Config
      run: |
        cp $CONFIG_FILE openwrt/.config
        [ -d files ] && cp -r files openwrt/files
        cd openwrt
        make defconfig

    - name: Kill WiFi
      run: |
        cd openwrt

        make defconfig

        sed -i '/CONFIG_PACKAGE_.*wpad/d' .config
        sed -i '/CONFIG_PACKAGE_.*hostapd/d' .config
        sed -i '/CONFIG_PACKAGE_.*supplicant/d' .config
        sed -i '/CONFIG_PACKAGE_.*ath11k/d' .config
        sed -i '/CONFIG_PACKAGE_.*mac80211/d' .config
        sed -i '/CONFIG_PACKAGE_.*cfg80211/d' .config
        sed -i '/CONFIG_PACKAGE_.*wifi/d' .config
        sed -i '/CONFIG_PACKAGE_.*iw/d' .config
        sed -i '/CONFIG_PACKAGE_.*wireless/d' .config

        sed -i '/CONFIG_DEFAULT_.*wpad/d' .config
        sed -i '/CONFIG_DEFAULT_.*hostapd/d' .config
        sed -i '/CONFIG_DEFAULT_.*supplicant/d' .config
        sed -i '/CONFIG_DEFAULT_.*ath11k/d' .config
        sed -i '/CONFIG_DEFAULT_.*mac80211/d' .config
        sed -i '/CONFIG_DEFAULT_.*cfg80211/d' .config
        sed -i '/CONFIG_DEFAULT_.*wifi/d' .config
        sed -i '/CONFIG_DEFAULT_.*iw/d' .config
        sed -i '/CONFIG_DEFAULT_.*wireless/d' .config

        echo "# CONFIG_PACKAGE_wpad is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-basic is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-basic-mbedtls is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-basic-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-wolfssl is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-full is not set" >> .config
        echo "# CONFIG_PACKAGE_wpad-full-openssl is not set" >> .config
        echo "# CONFIG_PACKAGE_hostapd is not set" >> .config
        echo "# CONFIG_PACKAGE_hostapd-common is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant-full is not set" >> .config
        echo "# CONFIG_PACKAGE_supplicant-full-internal is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-ath11k is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-ath11k-ahb is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-ath11k-pci is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-mac80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_mac80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_kmod-cfg80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_cfg80211 is not set" >> .config
        echo "# CONFIG_PACKAGE_wifi-scripts is not set" >> .config
        echo "# CONFIG_PACKAGE_iw is not set" >> .config
        echo "# CONFIG_PACKAGE_iw-tiny is not set" >> .config
        echo "# CONFIG_PACKAGE_iw-full is not set" >> .config
        echo "# CONFIG_PACKAGE_wireless-regdb is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-wireless is not set" >> .config

        echo "# CONFIG_DEFAULT_wpad is not set" >> .config
        echo "# CONFIG_DEFAULT_wpad-basic is not set" >> .config
        echo "# CONFIG_DEFAULT_wpad-basic-openssl is not set" >> .config
        echo "# CONFIG_DEFAULT_wpad-openssl is not set" >> .config
        echo "# CONFIG_DEFAULT_wpad-full is not set" >> .config
        echo "# CONFIG_DEFAULT_wpad-full-openssl is not set" >> .config
        echo "# CONFIG_DEFAULT_hostapd is not set" >> .config
        echo "# CONFIG_DEFAULT_hostapd-common is not set" >> .config
        echo "# CONFIG_DEFAULT_supplicant is not set" >> .config
        echo "# CONFIG_DEFAULT_supplicant-full is not set" >> .config
        echo "# CONFIG_DEFAULT_supplicant-full-internal is not set" >> .config
        echo "# CONFIG_DEFAULT_kmod-mac80211 is not set" >> .config
        echo "# CONFIG_DEFAULT_wifi-scripts is not set" >> .config
        echo "# CONFIG_DEFAULT_iw is not set" >> .config
        echo "# CONFIG_DEFAULT_iw-tiny is not set" >> .config
        echo "# CONFIG_DEFAULT_luci-app-wireless is not set" >> .config

        make defconfig

        echo "==== WiFi 残留检查 ===="
        grep -E "CONFIG_(PACKAGE|DEFAULT)_(wpad|hostapd|supplicant|ath11k|mac80211|cfg80211|wifi|iw|wireless)" .config || true

        if grep -qE "CONFIG_PACKAGE_(wpad|wpad-openssl|wpad-full|wpad-full-openssl|hostapd|supplicant|kmod-mac80211|wifi-scripts|iw)=y" .config; then
          echo "ERROR: WiFi packages still enabled"
          exit 1
        fi

    - name: Download
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Organize Firmware
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        tag: ZN-M2-Ultimate-${{ github.run_number }}
        name: ZN-M2 Ultimate Firmware
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
